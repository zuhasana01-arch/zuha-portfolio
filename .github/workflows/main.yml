name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# minimal permissions for Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Node 20
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"          # enables automatic pnpm cache

      # 3) Install pnpm 8 (official action)  ← **this fixes “pnpm not found”**
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false     # we run install ourselves next step

      # 4) Install dependencies (honours pnpm-lock.yaml)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5) Build your Vite site
      - name: Build site
        run: pnpm run build      # makes ⬆ dist/ by default

      # 6) Upload build output for the deploy job
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
